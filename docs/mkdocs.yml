# History

# Project information
site_name: Flexible Horseshoe Card for Home Assistant
site_url: https://flexible-horseshoe-card-manual.amoebelabs.com/
site_author: Marco
site_description: >-
  The versatile custom Flexible Horseshoe Card for Home Assistant allows you to create your horseshoe alike visualizations.

# Repository
repo_name: Flexible Horseshoe Card
repo_url: https://github.com/amoebelabs/flexible-horseshoe-card
edit_uri: ''

copyright: Copyright &copy; 2026 Marco @AmoebeLabs

watch:
  - docs

theme:
  name: material
  palette:
    # Palette toggle for automatic mode
    - media: '(prefers-color-scheme)'
      primary: amoebelabs-light
      accent: amoebelabs-light
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode

    # Palette toggle for light mode
    - media: '(prefers-color-scheme: light)'
      primary: amoebelabs-light
      accent: amoebelabs-light
      #      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - media: '(prefers-color-scheme: dark)'
      scheme: slate
      primary: amoebelabs-dark
      accent: amoebelabs-dark
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  logo: assets/logo/fhs-logo.svg
  custom_dir: overrides
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight

plugins:
  - search
  - tags
  - blog
  - minify:
      minify_html: true
