extra_css:
  - assets/stylesheets/extra.css

extra_javascript:
  - assets/javascripts/extra.js

extra:
  social:
    - icon: bmc/bmc-logo
      link: https://www.buymeacoffee.com/amoebelabs/
    - icon: amoebelabs/al-logo-social
      link: https://amoebelabs.com/
    - icon: m3/m3-logo-social
      link: https://material3-themes-manual.amoebelabs.com/
    - icon: fontawesome/brands/github
      link: https://github.com/amoebelabs/
    - icon: fontawesome/brands/instagram
      link: https://www.instagram.com/amoebelabs/
    - icon: fontawesome/brands/twitter
      link: https://twitter.com/amoebelabs/

  # analytics:
  #   provider: google
  #   property: G-YH4P44GYYJ

markdown_extensions:
  - admonition
  - abbr
  - def_list
  - footnotes
  - meta
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  # Formatting
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  # Grids
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      options:
        custom_icons:
          - overrides/.icons
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.magiclink:
      repo_url_shorthand: true
      user: squidfunk
      repo: mkdocs-material
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid-experimental
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

# Page tree
nav:
  - Home: index.md
  - Getting started:
      - Introduction: getting-started/introduction.md
      - Install with HACS: getting-started/installation.md
  - Examples:
      - Overview: examples/overview.md
      - Functional Cards:
          - AirVisual Card: examples/functional-cards/airvisual-card.md
          - Battery Sensor Card: examples/functional-cards/battery-sensor-card.md
          - Binary Sensor Card: examples/functional-cards/binary-sensor-card.md
          - Environment Card: examples/functional-cards/environment-card.md
          - Header Card: examples/functional-cards/header-card.md
          - Input Boolean Card: examples/functional-cards/input-boolean-card.md
          - Light Card: examples/functional-cards/light-card.md
          - Light Slider Card: examples/functional-cards/light-slider-card.md
          - Navigate Card: examples/functional-cards/navigate-card.md
          - Person Card: examples/functional-cards/person-card.md
          - Power Outlet Card: examples/functional-cards/power-outlet-card.md
          - Scene Card: examples/functional-cards/scene-card.md
          - Sensor Card: examples/functional-cards/sensor-card.md
          - Server Statistics Card: examples/functional-cards/server-statistics-card.md
          - Switch Card: examples/functional-cards/switch-card.md
          - Kleenex Pollen Card: examples/functional-cards/kleenex-pollen-card.md
  - Card configuration:
      - Overview: card-configuration/overview.md
      - Card Specials:
          - Reuse:
              - Reuse of Section Parts: card-configuration/reusing-section-parts.md
              - YAML Calculations: card-configuration/yaml-calculations.md
              - Combining the two: card-configuration/combining-reuse-and-calculations.md
          - Positioning and Groups: card-configuration/positioning-and-groups.md
          - Localization: card-configuration/localization.md
          - Animations: card-configuration/animations.md
          - Color Stops: card-configuration/color-stops.md
          - CSS Styling: card-configuration/styling.md
          - Templating: card-configuration/templating.md
      - Card Sections:
          - Size of Card: card-configuration/size-of-card.md
          - Entity Definitions: card-configuration/entity-definitions.md
          - External Palettes: card-configuration/external-palettes.md
          - Template Variables: card-configuration/template-variables.md
          - Layout Sections:
              - Groups: card-configuration/groups-section.md
              - Circles: card-configuration/circles-section.md
              - Horse Shoes:
                  - Main: card-configuration/horseshoes-section.md
                  - Ticks: card-configuration/horseshoe-ticks.md
                  - Labels: card-configuration/horseshoe-labels.md
              - Entity Areas: card-configuration/areas-section.md
              - Entity Icons: card-configuration/icons-section.md
              - Entity Names: card-configuration/names-section.md
              - Entity States: card-configuration/states-section.md
              - Lines:
                  - Horizontal Lines: card-configuration/hlines-section.md
                  - Vertical Lines: card-configuration/vlines-section.md
