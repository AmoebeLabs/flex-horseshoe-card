name: Deploy MkDocs

on:
  push:
    branches:
      - master
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install MkDocs
        run: |
          pip install mkdocs-material  mkdocs-minify-plugin

      - name: Deploy
        working-directory: docs
        run: mkdocs gh-deploy --force
